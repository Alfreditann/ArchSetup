font_size 13

disable_ligatures no
enable_audio_bell no

shell zsh
shell_integration disabled

cursor_shape block
cursor_blink_interval 0
cursor_stop_blinking_after 0

url_style curly

remember_window_size no
initial_window_width 640
initial_window_height 480
window_padding_width 10

background_opacity 1.0
scrollbar_handle_opacity 0
scrollbar_track_opacity 0
scrollbar_track_hover_opacity 0
confirm_os_window_close 0

sync_to_monitor no

# Red and blue palette
foreground #f2f7ff
background #050816
selection_foreground #f2f7ff
selection_background #1f4f8f

cursor #d62828
cursor_text_color #050816

active_border_color #2a6fdb
inactive_border_color #10213a
bell_border_color #ff4d4d

color0  #050816
color1  #d62828
color2  #ff4d4d
color3  #8b1d1d
color4  #1f4f8f
color5  #2a6fdb
color6  #4d8dff
color7  #f2f7ff
color8  #2a1244
color9  #ff4d4d
color10 #ff6b6b
color11 #ff8787
color12 #2a6fdb
color13 #a855f7
color14 #8fb3ff
color15 #ffffff

mark1_background #d62828
mark1_foreground #ffffff
mark2_background #2a6fdb
mark2_foreground #050816
mark3_background #ff4d4d
mark3_foreground #050816